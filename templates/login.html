{% extends "base.html" %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg border-0 login-card">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <img src="/static/img/cerdo.png" alt="Logo" width="80" class="mb-3">
                <h3 class="fw-bold text-dark">Acceso al Sistema</h3>
            </div>
            
            <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label text-muted">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fas fa-user text-muted"></i></span>
                        <input type="text" class="form-control border-start-0" id="username" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" class="form-control border-start-0" id="password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold shadow-sm" id="btnLogin">
                    <span class="spinner-border spinner-border-sm d-none" id="loginSpinner"></span>
                    Ingresar
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
